version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: adoption_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: callejeros_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: callejeros_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: always

  adoption.api:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: callejeros_api
    depends_on:
      - postgres
      - minio
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=callejeros_db;Username=postgres;Password=postgres"
    ports:
      - "5239:5239"
    restart: always

volumes:
  pgdata:
  minio_data:
